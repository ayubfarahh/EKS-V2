repositories:
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns/
  - name: traefik
    url: https://traefik.github.io/charts
  - name: cert-manager
    url: https://charts.jetstack.io



releases:
  - name: external-dns
    namespace: external-dns
    chart: external-dns/external-dns
    version: v1.20.0
    values:
      - serviceAccount:
          create: true
          name: external-dns
        sources:
          - ingress
          - service
        provider: aws
        aws:
          region: eu-west-2
        domainFilters:
          - ayubs.uk
        registry: txt
        txtOwnerId: eks-v2

  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager/cert-manager
    version: v1.19.1
    values:
      - crds:
          enabled: true

  - name: traefik
    namespace: traefik
    chart: traefik/traefik
    version: 38.0.2
    values:
      - service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
            external-dns.alpha.kubernetes.io/hostname: eks.ayubs.uk
        ports:
          web:
            port: 80
            exposedPort: 80
          websecure:
            port: 443
            exposedPort: 443
            tls:
              enabled: true